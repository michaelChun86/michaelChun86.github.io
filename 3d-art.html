  <body data-page="3d-art">
    <header class="site-header">
      <div class="container header-inner">
        <div class="logo-row">
          <a class="logo-link" href="index.html">
            <img class="logo-img logo-normal" src="Image/Hero/Logo.webp" alt="Michael Chun" />
            <img class="logo-img logo-hover" src="Image/Hero/Logo1.webp" alt="" aria-hidden="true" />

          <button class="menu-toggle" aria-label="메뉴 열기" aria-expanded="false">
            <span></span><span></span><span></span>
          </button>
        </div>
        <nav class="site-nav" aria-label="메인 메뉴">
          <a href="index.html">HOME</a>

    <main>
      <section class="page-hero page-hero-compact">
        <div class="container">
          <h1 class="page-title">3D ART</h1>
        </div>
      </section>

      <section class="gallery-section">
        <div class="container">
          <div class="gallery-filter">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="professional">Professional</button>
            <button class="filter-btn" data-filter="personal">Personal</button>
          </div>
          <div class="gallery-grid" data-gallery></div>
        </div>
      </section>
    </main>

    <div class="lightbox" aria-hidden="true">
      <button class="lightbox-close" aria-label="닫기">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" aria-hidden="true"><line x1="5" y1="5" x2="19" y2="19" /><line x1="19" y1="5" x2="5" y2="19" /></svg>
      </button>
      <button class="lightbox-nav prev" aria-label="이전 이미지">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 4 7 12 15 20" /></svg>
      </button>
      <div class="lightbox-content">
        <img alt="확대 이미지" />
        <div class="lightbox-caption"></div>
      </div>
      <button class="lightbox-nav next" aria-label="다음 이미지">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 4 17 12 9 20" /></svg>

        <div class="footer-contact">
