<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 20">
  <rect width="30" height="20" fill="#ffffff"/>
  <!-- 태극 -->
  <circle cx="15" cy="10" r="5" fill="#0047a0"/>
  <path d="M10,10 A5,5 0 0 1 20,10 A2.5,2.5 0 0 1 15,10 A2.5,2.5 0 0 0 10,10 Z" fill="#cd2e3a"/>
  <!-- 4괘 -->
  <g fill="#000000">
    <!-- 좌상단 건(乾) 3실선 -->
    <g transform="translate(5.5,4.5) rotate(33.69)">
      <rect x="-3" y="-1.85" width="6" height="0.85"/>
      <rect x="-3" y="-0.42" width="6" height="0.85"/>
      <rect x="-3" y="1.0" width="6" height="0.85"/>
    </g>
    <!-- 우상단 감(坎) 끊-실-끊 -->
    <g transform="translate(24.5,4.5) rotate(-33.69)">
      <rect x="-3" y="-1.85" width="2.4" height="0.85"/><rect x="0.6" y="-1.85" width="2.4" height="0.85"/>
      <rect x="-3" y="-0.42" width="6" height="0.85"/>
      <rect x="-3" y="1.0" width="2.4" height="0.85"/><rect x="0.6" y="1.0" width="2.4" height="0.85"/>
    </g>
    <!-- 좌하단 이(離) 실-끊-실 -->
    <g transform="translate(5.5,15.5) rotate(-33.69)">
      <rect x="-3" y="-1.85" width="6" height="0.85"/>
      <rect x="-3" y="-0.42" width="2.4" height="0.85"/><rect x="0.6" y="-0.42" width="2.4" height="0.85"/>
      <rect x="-3" y="1.0" width="6" height="0.85"/>
    </g>
    <!-- 우하단 곤(坤) 3끊선 -->
    <g transform="translate(24.5,15.5) rotate(33.69)">
      <rect x="-3" y="-1.85" width="2.4" height="0.85"/><rect x="0.6" y="-1.85" width="2.4" height="0.85"/>
      <rect x="-3" y="-0.42" width="2.4" height="0.85"/><rect x="0.6" y="-0.42" width="2.4" height="0.85"/>
      <rect x="-3" y="1.0" width="2.4" height="0.85"/><rect x="0.6" y="1.0" width="2.4" height="0.85"/>
    </g>
  </g>
</svg>
